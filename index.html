<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 15px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
        }
        textarea {
            width: 100%;
            height: 250px;
            border-radius: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            padding: 12px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
            outline: none;
            resize: none;
        }
        textarea:focus {
            border-color: var(--tg-theme-button-color, #248bcf);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--tg-theme-button-color, #248bcf);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <textarea id="textInput" placeholder="Введите текст..."></textarea>
    <button id="saveBtn">✅ СОХРАНИТЬ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // Ждем загрузки DOM
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const textInput = document.getElementById("textInput");

            // Проверяем наличие текста в URL
            if (urlParams.has('text')) {
                try {
                    const rawText = urlParams.get('text');
                    textInput.value = decodeURIComponent(rawText);
                } catch (e) {
                    console.error("Ошибка декодирования текста", e);
                }
            } else {
                textInput.value = "";
            }
        });

        // Отправка данных боту
        document.getElementById("saveBtn").addEventListener("click", () => {
            const val = document.getElementById("textInput").value;
            tg.sendData(val); // Отправляет данные обратно в чат с ботом
            tg.close();
        });
    </script>
</body>
</html>
