<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        textarea { width: 100%; height: 250px; border-radius: 10px; border: 1px solid #555; padding: 10px; box-sizing: border-box; font-size: 16px; background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); outline: none; }
        button { width: 100%; padding: 15px; background: #248bcf; color: white; border: none; border-radius: 10px; margin-top: 15px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <textarea id="textInput" placeholder="Загрузка текста..."></textarea>
    <button id="saveBtn">✅ СОХРАНИТЬ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        const urlParams = new URLSearchParams(window.location.search);
        const textInput = document.getElementById("textInput");

        // Извлекаем текст из параметра 'text' и декодируем его
        if (urlParams.has('text')) {
            textInput.value = decodeURIComponent(urlParams.get('text'));
        }

        document.getElementById("saveBtn").addEventListener("click", () => {
            tg.sendData(textInput.value); 
            tg.close();
        });
    </script>
</body>
</html>
