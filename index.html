<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Telegram Editor</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 100%; height: 300px; font-size: 16px; }
    button { margin-top: 10px; padding: 10px 20px; }
  </style>
</head>

<body>

<h2>Редактор поста</h2>

<textarea id="text"></textarea>

<br>

<button onclick="save()">💾 Сохранить</button>

<script>
const tg = window.Telegram.WebApp;

// 🔥 ОБЯЗАТЕЛЬНО
tg.ready();
tg.expand();

const params = new URLSearchParams(window.location.search);

const chat_id = params.get("chat_id");
const msg_id = params.get("msg_id");
const text = params.get("text");

// decode base64
function dec(str) {
    try {
        return atob(str);
    } catch {
        return "";
    }
}

// загрузка текста
document.getElementById("text").value = dec(text || "");

// 🔥 DEBUG
console.log("WebApp loaded");
console.log("initData:", tg.initData);

function save() {
    const newText = document.getElementById("text").value;

    const payload = {
        chat_id,
        msg_id,
        text: newText
    };

    console.log("SEND:", payload);

    // 🔥 защита от “тихой отправки”
    if (!tg.sendData) {
        alert("Telegram WebApp not ready");
        return;
    }

    tg.sendData(JSON.stringify(payload));

    // даём Telegram время отправить
    setTimeout(() => {
        tg.close();
    }, 200);
}
</script>

</body>
</html>
