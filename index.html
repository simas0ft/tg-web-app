<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
               padding: 15px; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        textarea { width: 100%; height: 250px; border: 1px solid #ccc; border-radius: 10px; padding: 10px; 
                   box-sizing: border-box; font-size: 16px; background: var(--tg-theme-secondary-bg-color); 
                   color: var(--tg-theme-text-color); }
        button { width: 100%; padding: 15px; background: #248bcf; color: white; border: none; 
                 border-radius: 10px; margin-top: 15px; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <textarea id="text_area" placeholder="Введите новый текст поста..."></textarea>
    <button id="save_btn">СОХРАНИТЬ ПРАВКИ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const urlParams = new URLSearchParams(window.location.search);
        const msgId = urlParams.get('msg_id');

        document.getElementById('save_btn').onclick = function() {
            const newText = document.getElementById('text_area').value;
            if (!newText) { alert("Текст не может быть пустым"); return; }
            
            // Отправляем данные боту
            tg.sendData(JSON.stringify({msg_id: msgId, text: newText}));
            tg.close();
        };
    </script>
</body>
</html>
