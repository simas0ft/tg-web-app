<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Telegram Editor</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 300px;
      font-size: 16px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2>Редактор поста</h2>

<textarea id="text"></textarea>

<br>

<button onclick="save()">💾 Сохранить</button>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const params = new URLSearchParams(window.location.search);

const chat_id = params.get("chat_id");
const msg_id = params.get("msg_id");
const text = params.get("text");

// 🔥 ВАЖНО: загружаем текст
document.getElementById("text").value = decodeURIComponent(text || "");

function save() {
    const newText = document.getElementById("text").value;

    const payload = {
        chat_id,
        msg_id,
        text: newText
    };

    console.log("SEND:", payload);

    tg.sendData(JSON.stringify(payload));
    tg.close();
}
</script>

</body>
</html>
